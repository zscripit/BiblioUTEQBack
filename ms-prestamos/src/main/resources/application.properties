spring.application.name=ms-prestamos
server.port=8082

# Reutiliza el archivo local de credenciales del servicio de identidad.
# No se versionan secretos ni se duplican contrasenas entre microservicios.
spring.config.import=optional:file:../.env[.properties]

spring.datasource.url=${BIBLIO_DB_URL}
spring.datasource.username=${BIBLIO_DB_USERNAME}
spring.datasource.password=${BIBLIO_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=${BIBLIO_DB_POOL_SIZE:5}
spring.datasource.hikari.minimum-idle=${BIBLIO_DB_MIN_IDLE:1}
spring.datasource.hikari.connection-timeout=10000

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true

spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8081/oauth2/jwks

eureka.client.service-url.defaultZone=http://127.0.0.1:8761/eureka/
eureka.instance.prefer-ip-address=true

notifications.oauth.token-uri=${IDENTITY_TOKEN_URI:http://localhost:8081/oauth2/token}
notifications.oauth.client-id=${MS_PRESTAMOS_CLIENT_ID:ms-prestamos-service}
notifications.oauth.client-secret=${MS_PRESTAMOS_CLIENT_SECRET}
