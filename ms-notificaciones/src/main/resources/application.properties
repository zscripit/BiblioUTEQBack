spring.application.name=ms-notificaciones
server.port=8085

spring.config.import=optional:file:../.env[.properties]

spring.datasource.url=${BIBLIO_DB_URL}
spring.datasource.username=${BIBLIO_DB_USERNAME}
spring.datasource.password=${BIBLIO_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.sql.init.mode=always

spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8081/oauth2/jwks

eureka.client.service-url.defaultZone=http://127.0.0.1:8761/eureka/
eureka.instance.prefer-ip-address=true

resend.api-key=${RESEND_API_KEY}
resend.from=${RESEND_FROM:Biblioteca UTEQ <onboarding@resend.dev>}
resend.test-mode=${RESEND_TEST_MODE:true}
resend.test-recipient=${RESEND_TEST_RECIPIENT:}
resend.max-attempts=${RESEND_MAX_ATTEMPTS:3}
notifications.retry-delay-ms=${NOTIFICATIONS_RETRY_DELAY_MS:300000}

identity.base-url=${IDENTITY_BASE_URL:http://localhost:8081}
identity.token-uri=${IDENTITY_TOKEN_URI:http://localhost:8081/oauth2/token}
identity.client-id=${MS_NOTIFICATIONS_CLIENT_ID:ms-notificaciones-service}
identity.client-secret=${MS_NOTIFICATIONS_CLIENT_SECRET}
